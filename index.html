<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小紅書筆記生成器</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #f5f5f5; min-height: 100vh; }
.container { max-width: 600px; margin: 0 auto; padding: 20px; }
h1 { text-align: center; color: #ff2442; margin: 30px 0; }
.card { background: white; border-radius: 12px; padding: 24px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
label { display: block; margin-bottom: 8px; color: #333; font-weight: 500; }
input, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; margin-bottom: 16px; }
button { width: 100%; padding: 14px; background: #ff2442; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; }
button:disabled { background: #ccc; }
.result { margin-top: 20px; padding: 20px; background: #f9f9f9; border-radius: 8px; display: none; }
.result h3 { color: #ff2442; margin-bottom: 12px; }
.result p { line-height: 1.8; white-space: pre-wrap; }
.result .tags { margin-top: 12px; color: #666; }
</style>
</head>
<body>
<div class="container">
<h1>📕 小紅書筆記生成器</h1>
<div class="card">
<label>主題/產品名稱</label>
<input type="text" id="topic" placeholder="例如：護髮素、旅遊攻略...">
<label>風格</label>
<select id="style">
<option value="recommendation">好物推薦</option>
<option value="sharing">經驗分享</option>
<option value="review">真實測評</option>
<option value="daily">日常碎片</option>
</select>
<button id="generateBtn" onclick="generate()">生成筆記</button>
</div>
<div class="result" id="result">
<h3 id="resultTitle"></h3>
<p id="resultContent"></p>
<div class="tags" id="resultTags"></div>
</div>
</div>
<script>
async function generate() {
  const topic = document.getElementById('topic').value.trim();
  const style = document.getElementById('style').value;
  if (!topic) { alert('請輸入主題'); return; }
  const btn = document.getElementById('generateBtn');
  btn.disabled = true;
  btn.textContent = '生成中...';
  document.getElementById('result').style.display = 'none';
  try {
    const res = await fetch('/api/generate', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({topic, style})
    });
    const data = await res.json();
    if (data.success) {
      document.getElementById('resultTitle').textContent = data.note.title;
      document.getElementById('resultContent').textContent = data.note.content;
      document.getElementById('resultTags').textContent = data.note.tags;
      document.getElementById('result').style.display = 'block';
    }
  } catch(e) { alert('生成失敗，請重試'); }
  btn.disabled = false;
  btn.textContent = '生成筆記';
}
</script>
</body>
</html>
